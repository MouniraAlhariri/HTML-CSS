<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mounira AlHariri - Portfolio</title>
    <style>
        :root { --primary-color: #2a9d8f; --bg-color: #f4f1de; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; color: #333; line-height: 1.6; }
        nav { background-color: var(--primary-color); padding: 15px; position: sticky; top: 0; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        section { padding: 60px 20px; max-width: 800px; margin: auto; }
        #home, #video { background-color: white; }
        #pictures, #contact { background-color: var(--bg-color); }
        img { max-width: 100%; height: auto; border-radius: 8px; margin: 10px 0; }
        form { display: flex; flex-direction: column; gap: 10px; }
        input, textarea, button { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        button { background-color: var(--primary-color); color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
        footer { background-color: var(--primary-color); color: white; text-align: center; padding: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <nav>
        <a href="#home">Home</a>
        <a href="#pictures">Gallery</a>
        <a href="#video">Video</a>
        <a href="#contact">Contact</a>
    </nav>
    <section id="home">
        <h1>Welcome to Mounira AlHariri's Page</h1>
        <p>Hello! I am Mounira. Welcome to my personal website. Use the navigation links above to jump to different sections of the page.</p>
    </section>
    <section id="pictures">
        <h2>Picture Gallery</h2>
        <img src="https://picsum.photos/id/1018/800/400" alt="Beautiful nature scenery">
    </section>
    <section id="video">
        <h2>Featured Video</h2>
        <iframe width="100%" height="450" src="https://www.youtube.com/embed/LXb3EKWsInQ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </section>
    <section id="contact">
        <h2>Contact Mounira</h2>
        <form action="#" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>
    <footer>
        <p>&copy; 2026 Mounira AlHariri. All rights reserved.</p>
    </footer>
</body>
</html>
